<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro do Usuário</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    border-radius:30px;
    overflow:hidden;
}

.topo{
    background:#cfcfcf;
    text-align:center;
    padding:25px;
}

.topo h1{
    font-size:28px;
    font-weight:normal;
    color:#555;
}

.formulario{
    background:#d5f0ee;
    padding:30px;
}

.campo{
    margin-bottom:25px;
}

.campo label{
    display:block;
    font-size:26px;
    color:#555;
    margin-bottom:8px;
}

.campo input{
    width:100%;
    height:45px;
    border:none;
    background:#fff;
    padding:10px;
    font-size:18px;
}

.rodape{
    background:#cfcfcf;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
}

.btn{
    border:none;
    background:#fff;
    padding:12px 40px;
    font-size:24px;
    color:#555;
    cursor:pointer;
}

.btn:hover{
    background:#f5f5f5;
}
</style>
</head>

<body>

<div class="container">

    <div class="topo">
        <h1>Cadastro do usuário</h1>
    </div>

    <div class="formulario">

        <div class="campo">
            <label>Nome:</label>
            <input type="text">
        </div>

        <div class="campo">
            <label>E-mail:</label>
            <input type="email">
        </div>

        <div class="campo">
            <label>Senha:</label>
            <input type="password">
        </div>

        <div class="campo">
            <label>Confirme a senha:</label>
            <input type="password">
        </div>

    </div>

    <div class="rodape">
        <button class="btn">Salvar</button>
        <button class="btn">Cancelar</button>
    </div>

</div>

</body>
</html>
