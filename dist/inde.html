<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Usuário</title>
    <link rel="stylesheet" href="./css/style.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:220px;
    border-radius:15px;
    overflow:hidden;
}

.topo{
    background:#cfcfcf;
    text-align:center;
    padding:8px;
}

.topo h1{
    font-size:14px;
    font-weight:normal;
    color:#555;
}

.formulario{
    background:#d5f0ee;
    padding:8px;
}

.campo{
    margin-bottom:5px;
}

.campo label{
    display:block;
    font-size:12px;
    color:#555;
    margin-bottom:4px;
}

.campo input{
    width:100%;
    height:20px;
    border:none;
    background:#fff;
    padding:5px;
    font-size:12px;
}

.rodape{
    background:#cfcfcf;
    padding:8px 15px;
    display:flex;
    justify-content:space-between;
}

.btn{
    border:none;
    background:#fff;
    padding:6px 10px;
    font-size:12px;
    color:#555;
    cursor:pointer;
}

.btn:hover{
    background:#f5f5f5;
}
</style>
</head>

<body>

<div class="container">

    <div class="topo">
        <h1>Cadastro do usuário</h1>
    </div>

    <div class="formulario">

        <div class="campo">
            <label>Nome:</label>
            <input type="text">
        </div>

        <div class="campo">
            <label>E-mail:</label>
            <input type="email">
        </div>

        <div class="campo">
            <label>Senha:</label>
            <input type="password">
        </div>

        <div class="campo">
            <label>Confirme a senha:</label>
            <input type="password">
        </div>

    </div>

    <div class="rodape">
        <button class="btn">Salvar</button>
        <button class="btn">Cancelar</button>
    </div>

</div>

</body>
</html>
